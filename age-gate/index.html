<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title> Thomas S. Moore</title>
    <link rel="stylesheet" media="all" href="../css/bootstrap.min.css">
    <link rel="stylesheet" media="all" href="../css/main.css">

<body class="age-gate">
    <div class="agegate__modal-blocker">
        <div class="agegate__modal">
            <div class="agegate__modal-inner">
    <!--
                <div class="modal__header">
                    <img class="logo-mobile" src="/etc.clientlibs/corporate/clientlibs/clientlib-site/resources/images/sazerac-logo.png" alt="Sazerac Logo" />
                </div>
    -->
                <div class="modal__body">
                    <p class="verify">Please verify your age.</p>
                    <div class="modal-content-outer">
                       <div class="modal-content-inner">
                           <p>Are you 21 or older?</p>
                        <ul class="modal__action-list-items">
                            <li class="modal__action-list-item" >
                                <button type="modal" class="modal-btn modal__btn--agree popup-agree">
                                    <span>Yes</span>
                                </button>
                            </li>										
                            <li class="modal__action-list-item">
                                <a href="${agegate.cancelUrl @ context='scriptString'}" class="modal-btn modal__btn--cancel popup-cancel">
                                    <span>No</span>
                                </a>		
                            </li>
                        </ul>			
                       </div>
                        				
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
